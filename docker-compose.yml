# =================================================================
# Eduscale LMS — Docker Compose (Phase 6: Load Balancing)
# =================================================================
# Normal run:     docker-compose up --build
# Scale up:       docker-compose up --scale backend=5
# Auto-scale:     node scripts/autoscale.js
# =================================================================

services:

  # ── Load Balancer (Nginx) ─────────────────────────────────────
  # Sits between frontend and backend.
  # Distributes requests across all backend instances.
  loadbalancer:
    image: nginx:alpine
    container_name: eduscale-loadbalancer
    restart: unless-stopped
    volumes:
      - ./nginx/loadbalancer.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    ports:
      - "8080:8080"          # Exposed for direct API testing
    networks:
      - eduscale-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/lb-health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Backend (Node.js/Express) ─────────────────────────────────
  # NO container_name — required for scaling (each gets auto name)
  # NO fixed host port — Docker assigns dynamic ports when scaled
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: ${MONGO_URI}
      REDIS_URL: ${REDIS_URL}
      FRONTEND_URL: http://localhost
      JWT_SECRET: ${JWT_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      EMAIL_SERVICE: ${EMAIL_SERVICE}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    networks:
      - eduscale-net
    # No ports exposed to host — only reachable via load balancer
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (React + Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: eduscale-frontend
    restart: unless-stopped
    depends_on:
      - loadbalancer
    ports:
      - "80:80"
    networks:
      - eduscale-net

networks:
  eduscale-net:
    driver: bridge
