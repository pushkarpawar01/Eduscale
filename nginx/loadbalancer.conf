# =================================================================
# Nginx Load Balancer Configuration
# Distributes traffic across multiple backend instances using
# Docker's internal DNS for dynamic service discovery.
# =================================================================

# Use Docker's embedded DNS resolver.
# 'valid=5s' means re-resolve every 5 seconds to discover
# new backend instances when scaled up/down.
resolver 127.0.0.11 valid=5s ipv6=off;

# Connection and proxy timeouts
proxy_connect_timeout   10s;
proxy_send_timeout      60s;
proxy_read_timeout      60s;

server {
    listen 8080;

    # ── Health Check Endpoint ──────────────────────────────────
    # Used by Docker healthchecks and monitoring tools.
    location /lb-health {
        access_log off;
        return 200 '{"status":"load_balancer_ok"}';
        add_header Content-Type application/json;
    }

    # ── Load Balanced API Proxy ────────────────────────────────
    # Using a variable in proxy_pass forces Nginx to re-resolve
    # 'backend' via Docker DNS on every request — this is what
    # enables dynamic scaling discovery in Nginx OSS.
    location / {
        set $upstream http://backend:5000;
        proxy_pass $upstream;

        proxy_http_version  1.1;
        proxy_set_header    Upgrade $http_upgrade;
        proxy_set_header    Connection 'upgrade';
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_cache_bypass  $http_upgrade;

        # Retry on backend failure — try another instance
        proxy_next_upstream error timeout http_500 http_502 http_503;
        proxy_next_upstream_tries 3;
    }
}
