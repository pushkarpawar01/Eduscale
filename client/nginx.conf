# =================================================================
# Frontend Nginx — Updated for Phase 6
# Now proxies API calls to the Load Balancer instead of directly
# to the backend service.
# =================================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── API Proxy → Load Balancer ──────────────────────────────
    # In Phase 5, this pointed to backend:5000 directly.
    # In Phase 6, it points to the load balancer which distributes
    # across all backend instances.
    location /api/ {
        proxy_pass http://loadbalancer:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # ── SPA Fallback ───────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static Asset Caching ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
